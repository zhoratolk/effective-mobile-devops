events {}
http {
    upstream backend_server {
        server backend:8080; # Используем имя сервиса из compose [cite: 88, 97]
    }
    server {
        listen 80; # Принимает запросы на порт 80 [cite: 20]
        location / {
            proxy_pass http://backend_server;
            # Проброс стандартных заголовков [cite: 100, 103]
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}